services:
  # Backend Web Service
  - type: web
    name: banker-backend
    env: node
    rootDir: banker-main/Backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        fromConfig: true
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://banker-frontend.onrender.com
      - key: IMAGEKIT_URL_ENDPOINT
        fromConfig: true
      - key: IMAGEKIT_PRIVATE_KEY
        fromConfig: true
      - key: IMAGEKIT_PUBLIC_KEY
        fromConfig: true
      - key: GEMINI_API_KEY
        fromConfig: true

  # Frontend Static Site
  - type: web
    name: banker-frontend
    env: static
    rootDir: banker-main/client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://banker-backend.onrender.com
